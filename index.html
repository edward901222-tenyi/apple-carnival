<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 經典踩地雷</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #game-info {
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #555;
        }

        /* 遊戲棋盤樣式 */
        #board {
            display: grid;
            grid-template-columns: repeat(10, 40px);
            grid-template-rows: repeat(10, 40px);
            gap: 2px;
            background-color: #bdbdbd;
            padding: 5px;
            border: 3px solid #7b7b7b;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* 格子基礎樣式 */
        .cell {
            width: 40px;
            height: 40px;
            background-color: #c6c6c6;
            border-left: 3px solid #fff;
            border-top: 3px solid #fff;
            border-right: 3px solid #7b7b7b;
            border-bottom: 3px solid #7b7b7b;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none; /* 防止右鍵或連點時選取到文字 */
        }

        /* 被點開的格子樣式 */
        .cell.revealed {
            background-color: #d9d9d9;
            border: 1px solid #ababab;
        }

        /* 踩到雷或遊戲結束顯示的雷 */
        .cell.mine {
            background-color: #ff4d4d;
        }

        /* 插旗子的狀態 */
        .cell.flagged::after {
            content: "🚩";
            font-size: 1rem;
        }

        /* 數字顏色設定 */
        .cell[data-count="1"] { color: #0000ff; }
        .cell[data-count="2"] { color: #008000; }
        .cell[data-count="3"] { color: #ff0000; }
        .cell[data-count="4"] { color: #000080; }
        .cell[data-count="5"] { color: #800000; }
        .cell[data-count="6"] { color: #008080; }
        .cell[data-count="7"] { color: #000000; }
        .cell[data-count="8"] { color: #808080; }

        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>HTML5 踩地雷</h1>
    <div id="game-info">剩餘地雷：<span id="mine-count">10</span></div>
    <div id="board"></div>
    <button id="restart-btn" onclick="initGame()">重新開始</button>

    <script>
        const BOARD_SIZE = 10; // 10x10 的棋盤
        const MINE_COUNT = 10; // 地雷總數

        let board = [];
        let revealedCount = 0;
        let gameOver = false;
        let flagsPlaced = 0;

        const boardElement = document.getElementById('board');
        const mineCountElement = document.getElementById('mine-count');

        // 初始化遊戲
        function initGame() {
            board = [];
            revealedCount = 0;
            gameOver = false;
            flagsPlaced = 0;
            boardElement.innerHTML = '';
            mineCountElement.innerText = MINE_COUNT;

            // 1. 建立空的棋盤資料結構與 DOM 節點
            for (let r = 0; r < BOARD_SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cellElement = document.createElement('div');
                    cellElement.classList.add('cell');
                    cellElement.dataset.row = r;
                    cellElement.dataset.col = c;

                    // 綁定滑鼠事件
                    cellElement.addEventListener('click', () => handleCellClick(r, c));
                    cellElement.addEventListener('contextmenu', (e) => handleCellRightClick(e, r, c));

                    boardElement.appendChild(cellElement);

                    board[r][c] = {
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0,
                        element: cellElement
                    };
                }
            }

            // 2. 隨機佈置地雷
            let minesPlanted = 0;
            while (minesPlanted < MINE_COUNT) {
                const r = Math.floor(Math.random() * BOARD_SIZE);
                const c = Math.floor(Math.random() * BOARD_SIZE);

                if (!board[r][c].isMine) {
                    board[r][c].isMine = true;
                    minesPlanted++;
                }
            }

            // 3. 計算每個格子周圍的地雷數
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c].isMine) continue;

                    let count = 0;
                    // 檢查九宮格周圍的 8 個方向
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr;
                            const nc = c + dc;
                            if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                                if (board[nr][nc].isMine) count++;
                            }
                        }
                    }
                    board[r][c].neighborMines = count;
                }
            }
        }

        // 左鍵點擊：挖地雷
        function handleCellClick(r, c) {
            if (gameOver) return;
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            // 踩到雷，遊戲結束
            if (cell.isMine) {
                endGame(false);
                cell.element.classList.add('mine');
                cell.element.innerText = "💣";
                return;
            }

            // 沒踩到雷，翻開格子
            revealCell(r, c);

            // 檢查是否獲勝 (翻開了所有不是雷的格子)
            if (revealedCount === (BOARD_SIZE * BOARD_SIZE) - MINE_COUNT) {
                endGame(true);
            }
        }

        // 右鍵點擊：插旗子
        function handleCellRightClick(e, r, c) {
            e.preventDefault(); // 阻止瀏覽器預設的右鍵選單
            if (gameOver) return;

            const cell = board[r][c];
            if (cell.isRevealed) return;

            if (!cell.isFlagged) {
                cell.isFlagged = true;
                cell.element.classList.add('flagged');
                flagsPlaced++;
            } else {
                cell.isFlagged = false;
                cell.element.classList.remove('flagged');
                flagsPlaced--;
            }

            mineCountElement.innerText = MINE_COUNT - flagsPlaced;
        }

        // 翻開格子的遞迴函式（核心：自動展開空白區）
        function revealCell(r, c) {
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            cell.isRevealed = true;
            revealedCount++;
            
            // 改變外觀
            cell.element.classList.add('revealed');
            cell.element.style.border = '1px solid #ababab';

            if (cell.neighborMines > 0) {
                // 如果周圍有雷，顯示數字
                cell.element.innerText = cell.neighborMines;
                cell.element.setAttribute('data-count', cell.neighborMines);
            } else {
                // 如果周圍沒有雷，遞迴翻開周圍 8 個格子
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const nr = r + dr;
                        const nc = c + dc;
                        if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }
        }

        // 結束遊戲
        function endGame(isWin) {
            gameOver = true;
            
            // 顯示所有地雷的位置
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c].isMine) {
                        board[r][c].element.classList.add('revealed');
                        if (!board[r][c].isFlagged) {
                            board[r][c].element.innerText = "💣";
                        }
                    }
                }
            }

            // 延遲一下跳出提示，讓玩家看得到最後一幕
            setTimeout(() => {
                if (isWin) {
                    alert('🎉 恭喜你！成功拆除所有地雷！');
                } else {
                    alert('💥 砰！你踩到地雷了，遊戲結束。');
                }
            }, 100);
        }

        // 網頁載入時初始化
        window.onload = initGame;
    </script>
</body>
</html>
